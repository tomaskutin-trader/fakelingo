<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Fakelingo</title>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Fakelingo"/>
<meta name="theme-color" content="#0d0d15"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%231a1a2e'/%3E%3Ctext y='360' x='256' text-anchor='middle' font-size='320'%3E%F0%9F%90%92%3C/text%3E%3C/svg%3E"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%231a1a2e'/%3E%3Ctext y='360' x='256' text-anchor='middle' font-size='320'%3E%F0%9F%90%92%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0d0d15;font-family:'Outfit',sans-serif;color:#f0f0f8}
button{font-family:'Outfit',sans-serif;cursor:pointer;border:none;outline:none;background:none}
input,textarea{font-family:'Outfit',sans-serif;outline:none}
textarea::placeholder,input::placeholder{color:#8888aa}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.screen{max-width:480px;margin:0 auto;padding:24px 20px 40px;display:flex;flex-direction:column;gap:14px;min-height:100dvh;animation:fadeUp .2s ease}
.qa-wrap{max-width:480px;margin:0 auto;display:flex;flex-direction:column;height:100dvh;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.logo{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:#22d3ee;letter-spacing:1px;background:#22d3ee18;padding:6px 12px;border-radius:8px;display:inline-block}
.hero-card{background:linear-gradient(135deg,#13131f,#1a1a2e);border:1px solid #ffffff12;border-radius:20px;padding:28px 24px;text-align:center}
.hero-title{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:#f0f0f8;letter-spacing:-1px}
.streak{margin-top:12px;display:inline-block;background:#f59e0b22;border:1px solid #f59e0b44;color:#fbbf24;border-radius:20px;padding:4px 14px;font-size:13px;font-weight:600}
.card{background:#13131f;border:1px solid #ffffff12;border-radius:14px;padding:14px 18px}
.row{display:flex;justify-content:space-between;align-items:center}
.btn-primary{background:linear-gradient(135deg,#22d3ee,#4ade80);color:#0a0a0f;border-radius:14px;padding:15px;font-size:15px;font-weight:700;width:100%;letter-spacing:.3px;border:none;cursor:pointer}
.btn-back{background:transparent;color:#8888aa;font-size:13px;padding:2px 0;text-align:left;cursor:pointer}
.btn-nav{flex:1;background:#13131f;color:#f0f0f8;border:1px solid #ffffff12;border-radius:12px;padding:13px;font-size:14px;font-weight:500;cursor:pointer}
.nav-row{display:flex;gap:10px}
.title{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:#f0f0f8}
.muted{color:#8888aa;font-size:13px}
.chip{background:#13131f;border:1px solid #ffffff12;border-radius:20px;padding:7px 13px;font-size:13px;color:#f0f0f8;font-weight:500;cursor:pointer;transition:all .15s}
.chip.active{background:#22d3ee22;border-color:#22d3ee;color:#22d3ee;font-weight:700}
.topic-grid{display:flex;flex-wrap:wrap;gap:8px}
.custom-row{display:flex;gap:8px}
.inp{flex:1;background:#13131f;border:1px solid #ffffff12;border-radius:12px;padding:11px 14px;color:#f0f0f8;font-size:14px}
.btn-go{background:#22d3ee;color:#0a0a0f;border-radius:12px;padding:11px 18px;font-size:14px;font-weight:700;border:none;cursor:pointer}
.article-list{display:flex;flex-direction:column;gap:10px}
.article-card{background:#13131f;border:1px solid #ffffff12;border-radius:16px;padding:16px;text-align:left;width:100%;cursor:pointer}
.loading-box{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:240px}
.spinner{width:30px;height:30px;border:3px solid #22d3ee33;border-top:3px solid #22d3ee;border-radius:50%;animation:spin .8s linear infinite}
.error-box{background:#f8717118;border:1px solid #f8717144;border-radius:12px;padding:14px;color:#fca5a5;font-size:14px}
.qa-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #ffffff12;background:#13131f;flex-shrink:0}
.qa-chat{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.bubble{max-width:85%;border-radius:16px;padding:11px 15px;font-size:14px;line-height:1.55;white-space:pre-wrap}
.bai{background:#1a1a2e;color:#f0f0f8;align-self:flex-start;border-bottom-left-radius:4px}
.buser{background:linear-gradient(135deg,#22d3ee22,#4ade8022);border:1px solid #22d3ee33;color:#f0f0f8;align-self:flex-end;border-bottom-right-radius:4px}
.bscore{background:#4ade8018;border:1px solid #4ade8033;color:#86efac;font-size:13px;font-style:italic;align-self:flex-start}
.qa-input-area{border-top:1px solid #ffffff12;padding:11px 14px;background:#13131f;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.qa-ta{background:#0d0d15;border:1px solid #ffffff12;border-radius:12px;padding:10px 13px;color:#f0f0f8;font-size:14px;resize:none;width:100%;font-family:'Outfit',sans-serif}
.qa-btns{display:flex;gap:8px}
.btn-mic{background:#1a1a2e;border:1px solid #ffffff12;border-radius:12px;padding:11px 15px;font-size:19px;flex-shrink:0;cursor:pointer;line-height:1}
.btn-mic.on{background:#f87171;border-color:#f87171;color:#fff}
.btn-mic.on:active{transform:scale(.95)}
.timer{font-family:'Space Mono',monospace;font-size:13px;color:#8888aa;text-align:center;padding:4px 0}
.timer.warning{color:#facc15}
.timer.danger{color:#f87171}
.bubble-q-hidden{cursor:pointer;color:#8888aa;font-size:13px;font-style:italic}
.bubble-q-hidden:hover{color:#f0f0f8}
.btn-send{flex:1;background:linear-gradient(135deg,#22d3ee,#4ade80);color:#0a0a0f;border-radius:12px;padding:12px;font-size:15px;font-weight:700;border:none;cursor:pointer}
.btn-send:disabled{opacity:.4}
.sg{background:#13131f;border:1px solid #ffffff12;border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:12px}
.sl{font-size:12px;color:#8888aa;font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.chips-row{display:flex;gap:8px;flex-wrap:wrap}
.history-list{display:flex;flex-direction:column;gap:8px}
.history-row{background:#13131f;border:1px solid #ffffff12;border-radius:12px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px}

/* ── Login screen ── */
.login-wrap{max-width:380px;margin:0 auto;padding:40px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;gap:24px;animation:fadeUp .3s ease}
.login-card{width:100%;background:#13131f;border:1px solid #ffffff12;border-radius:20px;padding:32px 28px;display:flex;flex-direction:column;gap:18px}
.login-title{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:#f0f0f8;text-align:center}
.login-sub{font-size:13px;color:#8888aa;text-align:center;margin-top:-8px}
.login-field{display:flex;flex-direction:column;gap:6px}
.login-label{font-size:12px;color:#8888aa;font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.login-inp{background:#0d0d15;border:1px solid #ffffff18;border-radius:12px;padding:13px 16px;color:#f0f0f8;font-size:15px;width:100%;transition:border-color .15s}
.login-inp:focus{border-color:#22d3ee44}
.login-err{background:#f8717118;border:1px solid #f8717144;border-radius:10px;padding:10px 14px;color:#fca5a5;font-size:13px;text-align:center;display:none}
.login-err.show{display:block}
.btn-login{background:linear-gradient(135deg,#22d3ee,#4ade80);color:#0a0a0f;border-radius:14px;padding:15px;font-size:15px;font-weight:700;width:100%;border:none;cursor:pointer;margin-top:4px;transition:opacity .15s}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<div id="app"></div>
<script>
var WORKER = "https://throbbing-wildflower-52c1.tomas-kutin.workers.dev/";
var DEFAULT_TOPICS = ["Cycling","Trading & Investment","Central Banking","Commodities","Geopolitics","Psychology in Sport","Energy","Technology & AI","Sport & Fitness","Travel","Business & Finance","Health & Psychology"];
var TOPICS = (function(){
  try { var t = localStorage.getItem("fakelingo_topics"); return t ? JSON.parse(t) : DEFAULT_TOPICS.slice(); }
  catch(e) { return DEFAULT_TOPICS.slice(); }
})();
function saveTopics() { try { localStorage.setItem("fakelingo_topics", JSON.stringify(TOPICS)); } catch(e) {} }
var LEVELS = ["A2","B1","B2","C1","C2"];
var SK = "fakelingo_v4";

// ── Auth ──────────────────────────────────────────────────────────────────────
// Session in sessionStorage — survives F5/reload, clears on tab/browser close

function getSession() { try { return sessionStorage.getItem("fl_session"); } catch(e) { return null; } }
function setSession(s) { try { sessionStorage.setItem("fl_session", s); } catch(e) {} }
function clearSession() { try { sessionStorage.removeItem("fl_session"); } catch(e) {} }

// Verify credentials against the Worker (Worker checks env.APP_SECRET)
async function verifyLogin(password) {
  var r = await fetch(WORKER, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({authCheck: true, appSecret: password.trim()})
  });
  if (r.status === 200) return password.trim();
  return false;
}
// ─────────────────────────────────────────────────────────────────────────────

function loadData() {
  try { var r = localStorage.getItem(SK); return r ? JSON.parse(r) : {history:[],settings:{duration:10,level:"B2",articleCount:6}}; }
  catch(e) { return {history:[],settings:{duration:10,level:"B2"}}; }
}
function save() { try { localStorage.setItem(SK, JSON.stringify(D)); } catch(e) {} }

function getNewsKey() { try { return localStorage.getItem("fakelingo_newskey") || ""; } catch(e){ return ""; } }
function saveNewsKey(k) { try { localStorage.setItem("fakelingo_newskey", k); } catch(e){} }

function getReadArticles() {
  try {
    var today = new Date().toISOString().slice(0,10);
    var r = JSON.parse(localStorage.getItem("fakelingo_read") || "{}");
    if (r.date !== today) return [];
    return r.urls || [];
  } catch(e) { return []; }
}
function markArticleRead(url) {
  try {
    var today = new Date().toISOString().slice(0,10);
    var r = JSON.parse(localStorage.getItem("fakelingo_read") || "{}");
    if (r.date !== today) r = {date:today, urls:[]};
    if (url && r.urls.indexOf(url) === -1) r.urls.push(url);
    localStorage.setItem("fakelingo_read", JSON.stringify(r));
  } catch(e) {}
}

var D = loadData();
var V = getSession() ? "home" : "login";
var topic = null, article = null, fullText = null, articles = null;
var qaMessages = [], qaHistory = [], currentQ = null;
var qCount = 0, scores = [], finalScore = null;
var qStart = null, lessonStart = null, maxQ = 5;
var repeatPenalty = false;
var speaking = false, listening = false, loading = false, rec = null;
var timerInterval = null, timerSeconds = 0, questionVisible = false;

function calcStreak(h) {
  if (!h.length) return 0;
  var s = 0, t = new Date(); t.setHours(0,0,0,0);
  for (var i = h.length-1; i >= 0; i--) {
    var d = new Date(h[i].date); d.setHours(0,0,0,0);
    if (Math.round((t-d)/86400000) - s <= 1) s++;
    else break;
  }
  return s;
}
function scoreColor(s) { return s >= 80 ? "#4ade80" : s >= 60 ? "#facc15" : "#f87171"; }

async function claude(messages, system) {
  var r = await fetch(WORKER, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:1000, system:system, messages:messages, appSecret: getSession()})
  });
  var d = await r.json();
  if (r.status === 401) { clearSession(); V="login"; render(); throw new Error("Session expired. Please log in again."); }
  if (d.error) throw new Error(d.error.message);
  return d.content[0].text;
}

function spk(text, cb) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  var rateMap = {"A2":0.82,"B1":0.88,"B2":0.95,"C1":1.05,"C2":1.12};
  u.lang = "en-US"; u.rate = rateMap[D.settings.level] || 0.95;
  var vs = window.speechSynthesis.getVoices();
  var v = null;
  for (var i = 0; i < vs.length; i++) {
    if (vs[i].lang === "en-US" && vs[i].name.indexOf("Google") >= 0) { v = vs[i]; break; }
  }
  if (!v) { for (var i = 0; i < vs.length; i++) { if (vs[i].lang === "en-US") { v = vs[i]; break; } } }
  if (v) u.voice = v;
  u.onend = function() { speaking = false; if (cb) cb(); render(); };
  u.onerror = function() { speaking = false; render(); };
  window.speechSynthesis.speak(u);
  speaking = true; render();
}
function stopSpk() { if (window.speechSynthesis) window.speechSynthesis.cancel(); speaking = false; }

function render() {
  var app = document.getElementById("app");
  if (V === "login") app.innerHTML = renderLogin();
  else if (V === "home") app.innerHTML = renderHome();
  else if (V === "topics") app.innerHTML = renderTopics();
  else if (V === "articles") app.innerHTML = renderArticles();
  else if (V === "read") app.innerHTML = renderRead();
  else if (V === "qa") app.innerHTML = renderQA();
  else if (V === "history") app.innerHTML = renderHistory();
  else if (V === "settings") app.innerHTML = renderSettings();
  bind();
}

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ── Login screen ──────────────────────────────────────────────────────────────
function renderLogin() {
  return '<div class="login-wrap">' +
    '<div style="font-size:52px">🐒</div>' +
    '<div class="login-card">' +
      '<div class="login-title">Fakelingo</div>' +
      '<div class="login-sub">Enter password to continue</div>' +
      '<div class="login-field"><div class="login-label">Password</div>' +
        '<input class="login-inp" id="loginPass" type="password" placeholder="Enter password" autocomplete="current-password"/>' +
      '</div>' +
      '<div class="login-err" id="loginErr">Incorrect password.</div>' +
      '<button class="btn-login" id="bLogin">Sign In →</button>' +
    '</div>' +
  '</div>';
}
// ─────────────────────────────────────────────────────────────────────────────

function renderHome() {
  var streak = calcStreak(D.history);
  var last = D.history.length ? D.history[D.history.length-1] : null;
  var today = new Date().toLocaleDateString("cs-CZ", {weekday:"long",day:"numeric",month:"long"});
  var html = '<div class="screen">';
  html += '<div class="row"><div class="logo">\u{1F412} Fakelingo</div><div class="muted">' + today + '</div></div>';
  html += '<div class="hero-card"><div style="font-size:48px;margin-bottom:6px">\u{1F3A7}</div>';
  html += '<div class="hero-title">Fakelingo</div>';
  html += '<div style="font-size:12px;color:#8888aa;margin-top:6px;letter-spacing:2px;text-transform:uppercase">Listen &middot; Speak &middot; Improve</div>';
  if (streak > 0) html += '<div class="streak">\u{1F525} ' + streak + ' day streak</div>';
  html += '</div>';
  if (last) html += '<div class="card row"><span class="muted">Last session</span><span style="font-family:\'Space Mono\',monospace;font-size:24px;font-weight:700;color:#4ade80">' + last.score + '<span style="font-size:13px;opacity:.6">/100</span></span></div>';
  html += '<button class="btn-primary" id="bStart">Start Today\'s Lesson</button>';
  html += '<div class="nav-row"><button class="btn-nav" id="bHistory">\u{1F4C8} History</button><button class="btn-nav" id="bSettings">\u2699\uFE0F Settings</button></div>';
  html += '<button id="bLogout" style="background:transparent;color:#8888aa;font-size:13px;text-align:center;width:100%;padding:4px 0;cursor:pointer">Sign out</button>';
  html += '</div>';
  return html;
}

function renderTopics() {
  var chips = TOPICS.map(function(t) {
    return '<button class="chip' + (topic === t ? ' active' : '') + '" data-t="' + esc(t) + '">' + esc(t) + '</button>';
  }).join("");
  return '<div class="screen"><button class="btn-back" id="bBack">\u2190 Back</button>' +
    '<div class="title">Choose Topic</div>' +
    '<div class="muted">Level: <b>' + D.settings.level + '</b> &middot; ' + D.settings.duration + ' min</div>' +
    '<div class="topic-grid">' + chips + '</div>' +
    '<div class="custom-row"><input class="inp" id="customTopic" placeholder="Or type your own topic..."/><button class="btn-go" id="bCustomGo">Go</button></div>' +
    '</div>';
}

function renderArticles() {
  if (loading || !articles) {
    return '<div class="screen"><button class="btn-back" id="bBack">\u2190 Back</button>' +
      '<div class="loading-box"><div class="spinner"></div><div class="muted">Finding articles on <b>' + esc(topic) + '</b>...</div></div></div>';
  }
  if (articles === "error") {
    return '<div class="screen"><button class="btn-back" id="bBack">\u2190 Back</button>' +
      '<div class="error-box">Failed to load articles. Please try again.</div></div>';
  }
  var cards = articles.map(function(a, i) {
    return '<button class="article-card" data-i="' + i + '">' +
      '<div style="font-size:15px;font-weight:700;color:#f0f0f8;margin-bottom:4px;line-height:1.4;text-align:left">' + esc(a.title) + '</div>' +
      '<div style="font-size:11px;color:#8888aa;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;text-align:left">' + esc(a.source) + ' &middot; ' + esc(a.readTime) + '</div>' +
      '<div style="font-size:13px;color:#aaaacc;line-height:1.5;text-align:left">' + esc(a.summary) + '</div>' +
      '<div style="font-size:12px;color:#22d3ee;margin-top:8px;font-weight:600;text-align:left;display:flex;justify-content:space-between;align-items:center">' +
        'Start reading \u2192' +
        '<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:' + (a.url && a.url.length>10 ? '#22d3ee22' : '#8888aa22') + ';color:' + (a.url && a.url.length>10 ? '#22d3ee' : '#8888aa') + '">' + (a.url && a.url.length>10 ? '\uD83D\uDCE1 Live' : '\uD83E\uDD16 AI') + '</span>' +
      '</div></button>';
  }).join("");
  return '<div class="screen"><button class="btn-back" id="bBack">\u2190 Back</button>' +
    '<div class="title">Pick an Article</div><div class="muted">' + esc(topic) + ' &middot; ' + D.settings.level + '</div>' +
    '<div class="article-list">' + cards + '</div></div>';
}

function renderRead() {
  var hasText = fullText && !loading;
  var html = '<div class="screen"><button class="btn-back" id="bBack">\u2190 Back</button>';
  html += '<div class="card"><div style="font-size:15px;font-weight:700;color:#f0f0f8;line-height:1.4">' + esc(article ? article.title : '') + '</div>';
  html += '<div style="font-size:11px;color:#8888aa;margin-top:4px;text-transform:uppercase;letter-spacing:.5px">' + esc(article ? article.source : '') + ' &middot; ' + esc(topic) + ' &middot; ' + D.settings.level + '</div></div>';
  if (loading) {
    html += '<div class="loading-box"><div class="spinner"></div><div class="muted">Loading article...</div></div>';
  } else {
    html += '<div style="font-size:15px;color:#ccccdd;line-height:1.8;background:#13131f;border:1px solid #ffffff12;border-radius:14px;padding:18px">' + esc(fullText || "").replace(/\n/g,"<br/>") + '</div>';
  }
  if (hasText) {
    var speakLabel = speaking ? "\u23F9 Stop Reading" : "\u25B6 Read Aloud";
    html += '<button id="bSpeak" style="background:#1a1a2e;border:1px solid ' + (speaking ? '#22d3ee' : '#ffffff12') + ';border-radius:12px;padding:12px 16px;color:' + (speaking ? '#22d3ee' : '#f0f0f8') + ';font-size:14px;font-weight:600;width:100%;cursor:pointer">' + speakLabel + '</button>';
    html += '<button class="btn-primary" id="bStartQA">I\'m Ready \u2014 Start Questions \u2192</button>';
  }
  html += '</div>';
  return html;
}

function renderQA() {
  var isDone = finalScore !== null;
  var bubbles = qaMessages.map(function(m) {
    if (m.r === "q") {
      if (m.visible) {
        return '<div class="bubble bai" id="qBubble" style="cursor:pointer" data-qidx="' + m.idx + '">' + esc(m.c) + '<div style="font-size:11px;color:#8888aa;margin-top:6px">tap to hide</div></div>';
      } else {
        return '<div class="bubble bai bubble-q-hidden" id="qBubble" data-qidx="' + m.idx + '">\uD83D\uDC41 tap to show question text</div>';
      }
    }
    var cls = m.r === "user" ? "buser" : m.r === "score" ? "bscore" : "bai";
    return '<div class="bubble ' + cls + '">' + esc(m.c) + '</div>';
  }).join("");
  if (loading) bubbles += '<div class="bubble bai" style="opacity:.6">\u25CF \u25CF \u25CF</div>';
  var timerCls = timerSeconds > 20 ? " danger" : timerSeconds > 10 ? " warning" : "";
  var timerStr = timerSeconds > 0 ? timerSeconds + "s" : "";
  var html = '<div class="qa-wrap">';

    html += '<div style="display:flex;gap:8px">';

    html += '<button id="bSkip" ' + (loading ? 'disabled' : '') + ' style="background:#1a1a2e;border:1px solid #ffffff22;border-radius:12px;padding:12px;font-size:13px;color:#8888aa;cursor:pointer;flex:1">\u23ED Skip (0 pts)</button>';
    html += '</div>';
    html += '</div>';
  } else {
    html += '<div style="padding:14px;border-top:1px solid #ffffff12;flex-shrink:0;display:flex;flex-direction:column;gap:8px">' +
      '<button class="btn-primary" id="bBackToArticles">\u2190 Back to Articles</button>' +
      '<button id="bHome" style="background:#13131f;border:1px solid #ffffff12;border-radius:14px;padding:13px;font-size:14px;font-weight:500;color:#8888aa;width:100%;cursor:pointer">\uD83C\uDFE0 Back to Home</button>' +
      '</div>';
  }
  html += '</div>';
  return html;
}

function renderHistory() {
  var h = D.history;
  if (!h.length) return '<div class="screen"><button class="btn-back" id="bBack">\u2190 Back</button><div class="title">History</div><div style="text-align:center;color:#8888aa;padding:40px 20px">No sessions yet.<br/>Start your first lesson!</div></div>';
  var last30 = h.slice(-30);
  var avg = Math.round(last30.reduce(function(a,x){return a+x.score;},0) / last30.length);
  var W=300,H=100,p=16;
  var sc = last30.map(function(x){return x.score;});
  var mn = Math.min.apply(null,sc), mx2 = Math.max.apply(null,sc), rng = mx2-mn||1;
  var pts = sc.map(function(v,i){
    var x = p+(i/Math.max(sc.length-1,1))*(W-2*p);
    var y = p+(1-(v-mn)/rng)*(H-2*p);
    return [x,y];
  });
  var poly = pts.map(function(pt){return pt[0]+","+pt[1];}).join(" ");
  var circles = pts.map(function(pt){return '<circle cx="'+pt[0]+'" cy="'+pt[1]+'" r="4" fill="#22d3ee"/>';}).join("");
  var rows = last30.slice().reverse().map(function(x){
    return '<div class="history-row"><div>' +
      '<div style="font-size:14px;font-weight:600;color:#f0f0f8">' + esc(x.topic) + '</div>' +
      '<div style="font-size:12px;color:#8888aa;margin-top:2px">' + new Date(x.date).toLocaleDateString("cs-CZ") + ' &middot; ' + x.duration + ' min</div></div>' +
      '<div style="font-family:\'Space Mono\',monospace;font-size:22px;font-weight:700;color:' + scoreColor(x.score) + ';flex-shrink:0">' + x.score + '</div></div>';
  }).join("");
  return '<div class="screen"><button class="btn-back" id="bBack">\u2190 Back</button><div class="title">Progress</div>' +
    '<div class="card row"><span class="muted">30-day average</span><span style="font-family:\'Space Mono\',monospace;font-size:24px;font-weight:700;color:#22d3ee">' + avg + '<span style="font-size:13px;opacity:.6">/100</span></span></div>' +
    '<div style="background:#13131f;border:1px solid #ffffff12;border-radius:14px;padding:16px;overflow:hidden">' +
    '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" style="overflow:visible"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#22d3ee"/></linearGradient></defs>' +
    (pts.length > 1 ? '<polyline points="' + poly + '" fill="none" stroke="url(#lg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>' : '') +
    circles + '</svg></div><div class="history-list">' + rows + '</div></div>';
}

function on(id, fn) { var e=document.getElementById(id); if(e) e.onclick=fn; }

function safeParseJSON(str) {
  // Strip markdown fences
  str = str.replace(/```json|```/g, "").trim();
  // Try direct parse first
  try { return JSON.parse(str); } catch(e) {}
  // Try to extract JSON array with regex
  var m = str.match(/\[[\s\S]*\]/);
  if (m) { try { return JSON.parse(m[0]); } catch(e) {} }
  return null;
}

async function fetchArticles() {
  loading=true; render();
  try {
    var newsKey = getNewsKey();
    var readUrls = getReadArticles();
    var rawArticles = [];

    if (newsKey) {
      var resp = await fetch(WORKER, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({newsapi: true, q: topic, key: newsKey, appSecret: getSession()})
      });
      var data = await resp.json();
      if (data.articles && data.articles.length) {
        var filtered = data.articles.filter(function(a){
          return a.url && readUrls.indexOf(a.url) === -1 && a.description && a.title;
        });
        var cnt = D.settings.articleCount || 6;
        var candidates = filtered.slice(0, cnt*2).map(function(a){
          return {title:a.title, source:a.source.name, description:a.description, url:a.url};
        });
        if (candidates.length) {
          var pickSys = "You are an English teacher. Pick "+cnt+" most suitable articles for a "+D.settings.level+" level learner studying '"+topic+"'. Return ONLY valid JSON array: [{title,source,summary,readTime,url},...] where summary is 2-3 sentences and readTime is like '~3 min read'. Keep summaries SHORT (max 100 chars each).";
          var picked = await claude([{role:"user",content:"Candidates: "+JSON.stringify(candidates)}], pickSys);
          rawArticles = safeParseJSON(picked) || [];
        }
      }
    }

    if (!rawArticles.length) {
      var t = await claude(
        [{role:"user",content:"Topic: "+topic+", Level: "+D.settings.level}],
        "Generate 4 article summaries for English learner at "+D.settings.level+" level about '"+topic+"'. Return ONLY valid JSON array: [{title,source,summary,readTime,url},...] where url is empty string. Keep summaries SHORT (max 100 chars each)."
      );
      rawArticles = safeParseJSON(t) || [];
    }

    articles = rawArticles.length ? rawArticles : "error";
  } catch(e) { console.error(e); articles="error"; }
  loading=false; render();
}

async function fetchArticle() {
  loading=true; render();
  try {
    var wordMap = {"5":"100-150","7":"150-200","10":"200-300","15":"300-400"};
    var words = wordMap[String(D.settings.duration)] || "200-300";
    var prompt, sys;
    if (article.url && article.url.length > 10) {
      prompt = "Article title: "+article.title+" | Source: "+article.source+" | Summary: "+(article.summary||"");
      sys = "You are an English learning content creator. Based on this real article title and summary, write an engaging "+words+"-word article at "+D.settings.level+" level that teaches the same content. Use natural journalistic style. Return ONLY the body text.";
    } else {
      prompt = "Topic: "+topic+", title: "+article.title;
      sys = "Write a realistic article at "+D.settings.level+" English level about '"+topic+"' titled '"+article.title+"'. "+words+" words, natural journalistic style. Return ONLY the body text.";
    }
    fullText = await claude([{role:"user",content:prompt}], sys);
  } catch(e) { fullText="Error loading article. Please go back and try again."; }
  loading=false; render();
}

async function fetchFirstQ() {
  loading=true; render();
  try {
    var q = await claude(
      [{role:"user",content:"Article:\n"+fullText+"\n\nAsk me the first question."}],
      "You are an English conversation teacher. Ask ONE clear comprehension or opinion question about the article on \""+topic+"\" at "+D.settings.level+" level. Return ONLY the question text."
    );

async function submitAnswer(ans) {
  var elapsed = qStart ? (Date.now()-qStart)/1000 : 30;
  var inp = document.getElementById("qaInput");
  if (inp) inp.value="";
  stopTimer(); qaMessages.push({r:"user",c:ans}); loading=true; render(); scrollChat();
  var sc = {content:60,grammar:60,speed:60,vocabulary:60,feedback:"Good effort!",ideal:""};
  try {
    var t = await claude(
      [{role:"user",content:"Q: "+currentQ+"\nStudent answer: "+ans+"\nTime: "+Math.round(elapsed)+"s\nArticle: "+fullText.slice(0,400)}],
      "Score the English answer and write an ideal answer. Return ONLY JSON (no markdown):\n{\"content\":N,\"grammar\":N,\"speed\":N,\"vocabulary\":N,\"feedback\":\"one short encouraging sentence\",\"ideal\":\"ideal 1-2 sentence answer\"}\nSpeed: under 10s=100, 10-20s=80, 20-30s=60, over 30s=40. All 0-100."
    );
    sc = JSON.parse(t.replace(/```json|```/g,"").trim());
  } catch(e) {}
  var isRepeat = repeatPenalty;
  var avg = Math.round((sc.content+sc.grammar+sc.speed+sc.vocabulary)/4);
  if(isRepeat) avg = Math.round(avg/2);
  repeatPenalty = false;
  scores.push(avg); qCount++;
  var penalty = isRepeat ? " (repeat -50%)" : "";
  var breakdown = sc.feedback+"\n\n"+
    "\uD83D\uDCDD Content: "+sc.content+"/100\n"+
    "\uD83D\uDCDA Grammar: "+sc.grammar+"/100\n"+
    "\uD83D\uDCAC Vocabulary: "+sc.vocabulary+"/100\n"+
    "\u26A1 Speed: "+sc.speed+"/100\n"+
    "\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n"+
    "\u2B50 Score: "+avg+"/100"+penalty+
    (sc.ideal ? "\n\n\uD83D\uDCA1 Ideal answer:\n"+sc.ideal : "");
  qaMessages.push({r:"score",c:breakdown});
  qaHistory.push({role:"user",content:"Article:\n"+fullText+"\n\nQ: "+currentQ});
  qaHistory.push({role:"assistant",content:currentQ});
  qaHistory.push({role:"user",content:ans});
  if (qCount >= maxQ) {
    var total = Math.round(scores.reduce(function(a,s){return a+s;},0)/scores.length);
    finalScore=total;
    qaMessages.push({r:"ai",c:"Great session! \uD83C\uDF89\nFinal score: "+total+"/100\n\nKeep it up!"});
    var dur = Math.round((Date.now()-lessonStart)/60000);
    D.history.push({score:total,topic:topic,articleTitle:article.title,duration:dur,date:new Date().toISOString()});
    save(); loading=false; render(); scrollChat();
  } else {
    try {
      var msgs = qaHistory.concat([{role:"user",content:"Ask me the next question about the article."}]);
      var nextQ = await claude(msgs,"You are an English conversation teacher. Ask ONE more question about the article on \""+topic+"\". Return ONLY the question text.");
      currentQ=nextQ; repeatPenalty=false;
      var qIdx = qaMessages.length;
      qaMessages.push({r:"q",c:nextQ,idx:qIdx,visible:false});
      render(); scrollChat();
      spk(nextQ, function(){ startTimer(); });
      qStart=Date.now();
    } catch(e) { qaMessages.push({r:"ai",c:"Could not load next question."}); }
    loading=false; render(); scrollChat();
  }
}

function scrollChat() { setTimeout(function(){ var c=document.getElementById("qaChat"); if(c) c.scrollTop=c.scrollHeight; },80); }

var accumulated = "";
function startListen() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert("Speech recognition requires Chrome on Android."); return; }
  accumulated = "";
  var inp = document.getElementById("qaInput");
  if (inp) inp.value = "";
  listening = true;
  render();
  startRecSession();
}
function startRecSession() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR || !listening) return;
  try {
    rec = new SR();
    rec.lang = "en-US";
    rec.interimResults = false;
    rec.continuous = false;
    rec.onresult = function(e) {
      for (var i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          accumulated += (accumulated ? " " : "") + e.results[i][0].transcript;
        }
      }
      var inp = document.getElementById("qaInput");
      if (inp) inp.value = accumulated;
    };
    rec.onend = function() {
      if (listening) setTimeout(startRecSession, 100);
    };
    rec.onerror = function() {
      if (listening) setTimeout(startRecSession, 150);
    };
    rec.start();
  } catch(e) { listening = false; render(); }
}
function stopListenAndSend() {
  listening = false;
  try { if (rec) { rec.onend = null; rec.stop(); } } catch(e) {}
  setTimeout(function() {
    var val = accumulated.trim();
    accumulated = "";
    if (val) submitAnswer(val);
    else render();
  }, 200);
}
function stopListen() { listening=false; try{ if(rec){ rec.onend=null; rec.stop(); } }catch(e){} render(); }

function startTimer() {
  stopTimer(); timerSeconds=0; qStart=Date.now();
  timerInterval=setInterval(function(){
    timerSeconds=Math.round((Date.now()-qStart)/1000);
    var t=document.querySelector(".timer");
    if(t){
      t.textContent=timerSeconds+"s";
      t.className="timer"+(timerSeconds>20?" danger":timerSeconds>10?" warning":"");
    }
  },1000);
}
function stopTimer() { if(timerInterval){clearInterval(timerInterval);timerInterval=null;} timerSeconds=0; }

render();
</script>
</body>
</html>
